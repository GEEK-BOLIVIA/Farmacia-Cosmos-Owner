<div class="bg-white dark:bg-[#1a222c] w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
    <div class="p-4 border-b border-gray-100 dark:border-[#2a3441] flex justify-between items-center bg-gray-50/50 dark:bg-[#111418]/50">
        <div class="flex items-center gap-2 pl-2">
            <span class="material-symbols-outlined text-primary">add_circle</span>
            <h3 class="text-lg font-extrabold text-[#111418] dark:text-white">Nueva Paleta</h3>
        </div>
        <button onclick="window.cerrarModalPaleta()" class="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-full transition-colors">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>
    
    <form id="formNuevaPaleta" class="p-6">
        <div class="mb-6">
            <label class="block text-[11px] font-bold uppercase tracking-wider text-gray-400 mb-1 ml-1">Nombre de la paleta</label>
            <input type="text" name="nombre" required placeholder="Ej. Estilo Minimalista" 
                class="w-full bg-gray-100 dark:bg-[#111418] border-none rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            
            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase text-gray-400 ml-1">Primario</label>
                <div class="flex items-center gap-2 bg-gray-50 dark:bg-[#111418] p-1.5 rounded-xl border border-gray-100 dark:border-gray-800">
                    <input type="color" data-for="primary_color" value="#3b82f6" class="color-picker w-8 h-8 rounded-lg cursor-pointer border-none bg-transparent">
                    <input type="text" name="primary_color" value="#3b82f6" maxlength="7" class="hex-input w-full bg-transparent border-none text-xs font-mono focus:ring-0 uppercase p-0">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase text-gray-400 ml-1">Secundario</label>
                <div class="flex items-center gap-2 bg-gray-50 dark:bg-[#111418] p-1.5 rounded-xl border border-gray-100 dark:border-gray-800">
                    <input type="color" data-for="secondary_color" value="#6366f1" class="color-picker w-8 h-8 rounded-lg cursor-pointer border-none bg-transparent">
                    <input type="text" name="secondary_color" value="#6366f1" maxlength="7" class="hex-input w-full bg-transparent border-none text-xs font-mono focus:ring-0 uppercase p-0">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase text-gray-400 ml-1">Acento</label>
                <div class="flex items-center gap-2 bg-gray-50 dark:bg-[#111418] p-1.5 rounded-xl border border-gray-100 dark:border-gray-800">
                    <input type="color" data-for="accent_color" value="#f59e0b" class="color-picker w-8 h-8 rounded-lg cursor-pointer border-none bg-transparent">
                    <input type="text" name="accent_color" value="#f59e0b" maxlength="7" class="hex-input w-full bg-transparent border-none text-xs font-mono focus:ring-0 uppercase p-0">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase text-gray-400 ml-1">P. Oscuro</label>
                <div class="flex items-center gap-2 bg-gray-50 dark:bg-[#111418] p-1.5 rounded-xl border border-gray-100 dark:border-gray-800">
                    <input type="color" data-for="primary_dark_color" value="#1e3a8a" class="color-picker w-8 h-8 rounded-lg cursor-pointer border-none bg-transparent">
                    <input type="text" name="primary_dark_color" value="#1e3a8a" maxlength="7" class="hex-input w-full bg-transparent border-none text-xs font-mono focus:ring-0 uppercase p-0">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase text-gray-400 ml-1">Fondo Claro</label>
                <div class="flex items-center gap-2 bg-gray-50 dark:bg-[#111418] p-1.5 rounded-xl border border-gray-100 dark:border-gray-800">
                    <input type="color" data-for="background_light_color" value="#ffffff" class="color-picker w-8 h-8 rounded-lg cursor-pointer border-none bg-transparent">
                    <input type="text" name="background_light_color" value="#ffffff" maxlength="7" class="hex-input w-full bg-transparent border-none text-xs font-mono focus:ring-0 uppercase p-0">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase text-gray-400 ml-1">Fondo Oscuro</label>
                <div class="flex items-center gap-2 bg-gray-50 dark:bg-[#111418] p-1.5 rounded-xl border border-gray-100 dark:border-gray-800">
                    <input type="color" data-for="background_dark_color" value="#0f172a" class="color-picker w-8 h-8 rounded-lg cursor-pointer border-none bg-transparent">
                    <input type="text" name="background_dark_color" value="#0f172a" maxlength="7" class="hex-input w-full bg-transparent border-none text-xs font-mono focus:ring-0 uppercase p-0">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase text-gray-400 ml-1">Superficie Osc.</label>
                <div class="flex items-center gap-2 bg-gray-50 dark:bg-[#111418] p-1.5 rounded-xl border border-gray-100 dark:border-gray-800">
                    <input type="color" data-for="surface_dark_color" value="#1e293b" class="color-picker w-8 h-8 rounded-lg cursor-pointer border-none bg-transparent">
                    <input type="text" name="surface_dark_color" value="#1e293b" maxlength="7" class="hex-input w-full bg-transparent border-none text-xs font-mono focus:ring-0 uppercase p-0">
                </div>
            </div>

        </div>

        <div class="mt-8 flex gap-3">
            <button type="button" onclick="window.cerrarModalPaleta()" class="flex-1 py-3 text-xs font-bold text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-all">
                Cancelar
            </button>
            <button type="submit" class="flex-[2] py-3 text-xs font-bold bg-primary text-white rounded-xl hover:shadow-lg transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-sm">palette</span>
                Crear Paleta
            </button>
        </div>
    </form>
</div>
